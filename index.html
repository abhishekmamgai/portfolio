<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abhishek Mamgai — AIML Developer</title>
    <meta name="description" content="CSE AIML student building intelligent systems and modern web experiences." />

    <!-- CRITICAL: prevent white/tailwind flash before React loads -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { background: #060610 !important; color: #e2e8f0; }

      /* Full screen native loader — shows BEFORE React even boots */
      #native-loader {
        position: fixed; inset: 0; z-index: 99999;
        background: #060610;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 20px;
        font-family: 'Courier New', monospace;
      }

      /* Outer ring */
      #native-loader .ring {
        width: 90px; height: 90px; position: relative;
      }
      #native-loader .ring svg {
        width: 90px; height: 90px;
        animation: spin 1.4s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Logo text */
      #native-loader .logo {
        font-size: 1.15rem; font-weight: 700; letter-spacing: 0.18em;
        background: linear-gradient(135deg, #7c3aed, #ec4899);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      }

      /* Progress bar */
      #native-loader .bar-wrap {
        width: 200px; height: 2px; background: rgba(124,58,237,0.15);
        border-radius: 2px; overflow: hidden;
      }
      #native-loader .bar {
        height: 100%;
        background: linear-gradient(90deg, #7c3aed, #ec4899, #06b6d4);
        background-size: 200% 100%;
        border-radius: 2px;
        animation: progress 2.4s ease forwards, shimmer 1s linear infinite;
        width: 0%;
      }
      @keyframes progress {
        0%   { width: 0%; }
        40%  { width: 55%; }
        70%  { width: 78%; }
        90%  { width: 92%; }
        100% { width: 100%; }
      }
      @keyframes shimmer {
        0%   { background-position: 0% 50%; }
        100% { background-position: 200% 50%; }
      }

      /* Status text */
      #native-loader .status {
        font-size: 0.65rem; letter-spacing: 0.2em;
        color: #334155;
      }

      /* dots */
      #native-loader .dots { display: flex; gap: 7px; }
      #native-loader .dots span {
        width: 6px; height: 6px; border-radius: 50%;
        animation: pulse 1.4s ease-in-out infinite;
      }
      #native-loader .dots span:nth-child(1){ background:#7c3aed; animation-delay:0s; }
      #native-loader .dots span:nth-child(2){ background:#ec4899; animation-delay:0.2s; }
      #native-loader .dots span:nth-child(3){ background:#06b6d4; animation-delay:0.4s; }
      @keyframes pulse {
        0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
        40%          { transform: scale(1.3); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <!-- This loader shows instantly, before any JS runs -->
    <div id="native-loader">
      <div class="logo">&lt; AIML.DEV /&gt;</div>
      <div class="ring">
        <svg viewBox="0 0 90 90" fill="none">
          <circle cx="45" cy="45" r="38" stroke="rgba(124,58,237,0.12)" stroke-width="3"/>
          <circle cx="45" cy="45" r="38"
            stroke="url(#rg)" stroke-width="3"
            stroke-linecap="round"
            stroke-dasharray="80 160"
          />
          <defs>
            <linearGradient id="rg" x1="0" y1="0" x2="90" y2="90" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#7c3aed"/>
              <stop offset="100%" stop-color="#ec4899"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="dots"><span></span><span></span><span></span></div>
      <div class="bar-wrap"><div class="bar"></div></div>
      <div class="status">INITIALIZING PORTFOLIO...</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Hide native loader once React mounts -->
    <script>
      window.__hideNativeLoader = function() {
        var el = document.getElementById('native-loader');
        if (el) {
          el.style.transition = 'opacity 0.5s ease';
          el.style.opacity = '0';
          setTimeout(function(){ el.style.display = 'none'; }, 500);
        }
      }
    </script>
  </body>
</html>
