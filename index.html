<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abhishek Mamgai — AIML Developer</title>
    <meta name="description" content="CSE AIML student building intelligent systems and modern web experiences." />
    <meta name="google-site-verification" content="Fl-6neTVrboIEnGReIAphDdlVJg0S4V3_X6-T4TRVrQ" />

    <!-- CRITICAL: prevent white/tailwind flash before React loads -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { background: #060610 !important; color: #e2e8f0; }

      #native-loader {
        position: fixed; inset: 0; z-index: 99999;
        background: #060610;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 15px;
        font-family: 'Courier New', monospace;
      }

      .a-loader {
        font-size: 6rem;
        font-weight: 900;
        font-family: 'Inter', system-ui, sans-serif;
        color: rgba(124, 58, 237, 0.1);
        position: relative;
        line-height: 1;
      }

      .a-loader::after {
        content: 'A';
        position: absolute;
        left: 0;
        top: 0;
        color: #7c3aed;
        overflow: hidden;
        clip-path: inset(100% 0 0 0);
        animation: loadUp 1s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
        text-shadow: 0 0 20px rgba(124, 58, 237, 0.6), 0 0 40px rgba(236, 72, 153, 0.4);
      }

      @keyframes loadUp {
        0% { clip-path: inset(100% 0 0 0); }
        100% { clip-path: inset(0% 0 0 0); }
      }

      #native-loader .status {
        font-size: 0.75rem; letter-spacing: 0.3em;
        color: #64748b;
        animation: pulse 1.5s ease-in-out infinite alternate;
      }

      @keyframes pulse {
        0% { opacity: 0.5; }
        100% { opacity: 1; text-shadow: 0 0 10px rgba(100,116,139,0.5); }
      }
    </style>
  </head>
  <body>
    <!-- This loader shows instantly, before any JS runs -->
    <div id="native-loader">
      <div class="a-loader">A</div>
      <div class="status">LOADING...</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Hide native loader once React mounts -->
    <script>
      window.__hideNativeLoader = function() {
        var el = document.getElementById('native-loader');
        if (el) {
          el.style.transition = 'opacity 0.5s ease';
          el.style.opacity = '0';
          setTimeout(function(){ el.style.display = 'none'; }, 500);
        }
      }
    </script>
  </body>
</html>
